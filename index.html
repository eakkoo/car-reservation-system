<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองรถฝ่ายคุณภาพน้ำ (Google Sheets)</title>
    
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/locales/th.global.min.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
            --color-van: #0ea5e9;    
            --color-truck: #f59e0b;  
            --color-car: #10b981;    
            --fc-border-color: #000000 !important; 
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
        .container { max-width: 1300px; margin: 0 auto; }
        
        /* สไตล์หน้า Login Overlay */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 35px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); text-align: center; }
        .login-box h2 { margin-bottom: 10px; color: #0f172a; }
        .login-box p { color: #64748b; font-size: 14px; margin-bottom: 20px; }
        .login-box input, .login-box select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; font-size: 15px; outline: none; }
        
        /* สไตล์แถบสถานะผู้ใช้งานด้านบน */
        .user-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 4px rgb(0 0 0 / 0.05); }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .role-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .role-admin { background-color: #fee2e2; color: #dc2626; }
        .role-user { background-color: #f0fdf4; color: #16a34a; }
        .btn-logout { background: #64748b; padding: 6px 12px; width: auto; font-size: 14px; margin: 0; }
        .btn-logout:hover { background: #475569; }

        header { text-align: center; margin-bottom: 25px; }
        header h1 { font-size: 2.2rem; color: #0f172a; margin-bottom: 5px; }
        header p { color: #64748b; }

        /* ส่วนคำอธิบายสีสัญลักษณ์รถ */
        .color-legend { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; font-size: 14px; font-weight: 600; }
        .color-box { width: 16px; height: 16px; border-radius: 4px; margin-right: 8px; }

        /* จัดโครงสร้าง Layout */
        .main-layout { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 950px) { .main-layout { grid-template-columns: 340px 1fr; } }

        .admin-only { display: block; }
        .user-view-mode .main-layout { grid-template-columns: 1fr; }
        .user-view-mode .admin-only { display: none; }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); height: fit-content; }
        .card h2 { font-size: 1.2rem; margin-bottom: 15px; color: #0f172a; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: #475569; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; outline: none; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        button { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 5px; }
        button:hover { background-color: var(--primary-hover); }

        /* ตกแต่งกล่องปฏิทินและเส้นตารางสีดำเข้ม */
        #calendar { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); min-height: 550px; }
        .fc-event { cursor: pointer; padding: 4px 6px; font-size: 13px; border: none !important; border-radius: 4px; }
        .fc th, .fc td { border: 1px solid #000000 !important; }
        .fc-theme-standard .fc-scrollgrid { border: 1px solid #000000 !important; }

        /* สไตล์หน้าจอกำลังโหลด */
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); justify-content: center; align-items: center; z-index: 10000; font-size: 20px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">⏳ กำลังประมวลผลข้อมูล...</div>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2>🔒 เข้าสู่ระบบจองรถ</h2>
        <p>กรุณาเลือกสิทธิ์เพื่อเข้าใช้งานระบบฝ่ายคุณภาพน้ำ</p>
        <form id="loginForm">
            <select id="loginRole" required>
                <option value="user">👤 ผู้ใช้งานทั่วไป (ดูตารางได้อย่างเดียว)</option>
                <option value="admin">🔑 ผู้ดูแลระบบ (แอดมิน - จัดการจองได้)</option>
            </select>
            <input type="password" id="loginPassword" placeholder="รหัสผ่าน (ทั่วไปไม่ต้องใส่)" />
            <button type="submit">เข้าสู่ระบบ</button>
        </form>
    </div>
</div>

<div class="container" id="mainContainer" style="display: none;">
    <div class="user-bar">
        <div class="user-info">
            <span>สถานะระบบปัจจุบัน:</span>
            <span id="roleBadge" class="role-badge"></span>
        </div>
        <button onclick="logout()" class="btn-logout">ออกจากระบบ 🚪</button>
    </div>

    <header>
        <h1>📅 ตารางจองรถฝ่ายคุณภาพน้ำ</h1>
        <p>ตรวจสอบสถานะคิวงานและการจองยานพาหนะผ่านระบบ Google Sheets ออนไลน์</p>
    </header>

    <div class="color-legend">
        <div class="legend-item"><div class="color-box" style="background: var(--color-van);"></div> 🚐 รถตู้ส่วนกลาง</div>
        <div class="legend-item"><div class="color-box" style="background: var(--color-truck);"></div> 🛻 รถกระบะขนของ</div>
        <div class="legend-item"><div class="color-box" style="background: var(--color-car);"></div> 🚗 รถยนต์ส่วนบุคคล</div>
    </div>

    <div class="main-layout">
        
        <div class="card admin-only">
            <h2>✍️ นัดหมายการใช้รถ (เฉพาะแอดมิน)</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label for="userName">ชื่อ-นามสกุล ผู้ขอจอง</label>
                    <input type="text" id="userName" placeholder="ระบุชื่อผู้ใช้งาน" required>
                </div>
                <div class="form-group">
                    <label for="carType">เลือกรถที่ต้องการ</label>
                    <select id="carType" required>
                        <option value="">-- เลือกยานพาหนะ --</option>
                        <option value="🚐 รถตู้ส่วนกลาง">🚐 รถตู้ส่วนกลาง</option>
                        <option value="🛻 รถกระบะขนของ">🛻 รถกระบะขนของ</option>
                        <option value="🚗 รถยนต์ส่วนบุคคล">🚗 รถยนต์ส่วนบุคคล</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="driverName">ชื่อพนักงานขับรถ</label>
                    <input type="text" id="driverName" placeholder="ระบุชื่อ พขร. หรือ ขับเอง" required>
                </div>
                <div class="form-group">
                    <label for="destination">สถานที่ที่จะไป / วัตถุประสงค์</label>
                    <input type="text" id="destination" placeholder="ระบุสถานที่และวัตถุประสงค์" required>
                </div>
                <div class="form-group">
                    <label for="startDate">วัน/เวลา เริ่มใช้รถ</label>
                    <input type="datetime-local" id="startDate" required>
                </div>
                <div class="form-group">
                    <label for="endDate">วัน/เวลา คืนรถ</label>
                    <input type="datetime-local" id="endDate" required>
                </div>
                <button type="submit">ยืนยันลงตารางจอง</button>
            </form>
        </div>

        <div id="calendar"></div>
    </div>
</div>

<script>
    // 🌟 นำ URL ของ Google Apps Script (Web App) มาวางแทนข้อความด้านล่างนี้ 🌟
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFdDAuLXRJYncnsjM7udyX_u189V8lX7nx2cq2U_UVhNW7lqjbhajnvpIA1n5xiemd/exec";

    let bookings = [];
    let calendar;
    let currentRole = null; 

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }

    // 1. ระบบควบคุมการล็อกอิน
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const role = document.getElementById('loginRole').value;
        const pass = document.getElementById('loginPassword').value;

        if (role === 'admin' && pass !== '1234') {
            alert('❌ รหัสผ่านแอดมินไม่ถูกต้อง!');
            return;
        }
        currentRole = role;
        initSystem();
    });

    async function initSystem() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainContainer').style.display = 'block';

        const roleBadge = document.getElementById('roleBadge');
        const body = document.body;

        if (currentRole === 'admin') {
            roleBadge.innerText = '🔑 ผู้ดูแลระบบ (Admin) สามารถจอง/ลบได้';
            roleBadge.className = 'role-badge role-admin';
            body.classList.remove('user-view-mode');
        } else {
            roleBadge.innerText = '👤 ผู้ใช้งานทั่วไป (User) โหมดดูอย่างเดียว';
            roleBadge.className = 'role-badge role-user';
            body.classList.add('user-view-mode');
        }

        await fetchBookingsFromSheets();
        renderCalendar();
    }

    // 2. ดึงข้อมูลจาก Google Sheets (เวอร์ชันแก้ไขปัญหา CORS บล็อกขาเข้า)
    function fetchBookingsFromSheets() {
        return new Promise((resolve) => {
            showLoading(true);
            
            // สร้างชื่อฟังก์ชันชั่วคราวสำหรับรับข้อมูล
            const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
            
            // กำหนดว่าเมื่อ Google ส่งข้อมูลกลับมาให้ทำอะไร
            window[callbackName] = function(data) {
                bookings = data; // เอาข้อมูลการจองใส่ในตัวแปรหลัก
                delete window[callbackName];
                document.body.removeChild(script);
                showLoading(false);
                resolve(); // ดึงข้อมูลเสร็จสิ้น
            };

            // สร้างแท็กพิเศษเพื่อดึงข้อมูลข้ามระบบโดยไม่โดนบล็อก
            const script = document.createElement('script');
            script.src = SCRIPT_URL + (SCRIPT_URL.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
            
            // ถ้าดึงข้อมูลล้มเหลว/URL ผิดพลาด
            script.onerror = function() {
                showLoading(false);
                alert("❌ ไม่สามารถดึงข้อมูลจากฐานข้อมูลหลักได้ กรุณาตรวจสอบความถูกต้องของ URL");
                resolve();
            };

            document.body.appendChild(script);
        });
    }

    // 3. จัดการปฏิทินและสัญลักษณ์สี
    function getCarColor(carType) {
        if (carType.includes("รถตู้")) return '#0ea5e9';
        if (carType.includes("รถกระบะ")) return '#f59e0b';
        return '#10b981';
    }

    function formatEventsForCalendar() {
        return bookings.map(b => ({
            id: b.id,
            title: `${b.car} [พขร: ${b.driver}] - ${b.name} (${b.location})`,
            start: b.start,
            end: b.end,
            backgroundColor: getCarColor(b.car),
            extendedProps: { name: b.name, car: b.car, driver: b.driver, location: b.location }
        }));
    }

    function renderCalendar() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            locale: 'th',
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            events: formatEventsForCalendar(),
            
            eventClick: async function(info) {
                const eventObj = info.event;
                
                if (currentRole !== 'admin') {
                    alert(`ℹ️ รายละเอียดการจองรถ:\n\nผู้ขอใช้งาน: ${eventObj.extendedProps.name}\nรถที่เลือก: ${eventObj.extendedProps.car}\nพนักงานขับรถ (พขร.): ${eventObj.extendedProps.driver}\nสถานที่ไป: ${eventObj.extendedProps.location}`);
                    return;
                }
                
                // สิทธิ์แอดมินลบแถวบน Google Sheets (ใช้ Cors แบบปกติสำหรับสิทธิ์แอดมินลบข้อมูล)
                if (confirm(`❌ ต้องการยกเลิกการจองนี้บน Google Sheets ใช่หรือไม่?\n\nผู้จอง: ${eventObj.extendedProps.name}\nรถ: ${eventObj.extendedProps.car}`)) {
                    showLoading(true);
                    try {
                        const response = await fetch(SCRIPT_URL, {
                            method: "POST",
                            body: JSON.stringify({ action: "delete", id: eventObj.id })
                        });
                        const result = await response.json();
                        if(result.status === "success") {
                            eventObj.remove();
                            bookings = bookings.filter(b => b.id !== eventObj.id);
                            alert('ลบข้อมูลออกจาก Google Sheets สำเร็จ');
                        }
                    } catch (error) {
                        alert('❌ ไม่สามารถลบข้อมูลได้ เนื่องจากระบบเชื่อมต่อขัดข้อง');
                    }
                    showLoading(false);
                }
            }
        });
        calendar.render();
    }

    // 4. ตรวจเช็คเวลาจองซ้อนกันบนเว็บแอป
    function isTimeOverlapping(newCar, newStart, newEnd) {
        const reqStart = new Date(newStart);
        const reqEnd = new Date(newEnd);

        for (let booking of bookings) {
            if (booking.car === newCar) {
                const bStart = new Date(booking.start);
                const bEnd = new Date(booking.end);
                if (reqStart < bEnd && reqEnd > bStart) return booking;
            }
        }
        return null;
    }

    // 5. บันทึกข้อมูลและส่งข้อมูลข้ามไปยัง Google Sheets (แก้ไขโหมดแก้ปัญหา CORS ล้มเหลว)
    document.getElementById("bookingForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const name = document.getElementById("userName").value.trim();
        const car = document.getElementById("carType").value;
        const driver = document.getElementById("driverName").value.trim();
        const location = document.getElementById("destination").value.trim(); 
        const start = document.getElementById("startDate").value;
        const end = document.getElementById("endDate").value;

        if (new Date(start) >= new Date(end)) {
            alert("❌ วันเวลาคืนรถ ต้องอยู่หลังเวลาที่เริ่มใช้รถครับ!");
            return;
        }

        const conflict = isTimeOverlapping(car, start, end);
        if (conflict) {
            alert(`❌ ไม่สามารถจองได้! ช่วงเวลานี้คุณ "${conflict.name}" ได้จองรถคันนี้ไว้แล้ว`);
            return;
        }

        const newId = Date.now().toString();
        const newBooking = { action: "create", id: newId, name, car, driver, location, start, end };

        showLoading(true);
        try {
            // ปรับไปใช้โหมด mode: "no-cors" เพื่อแก้ไขอาการบันทึกข้อมูลล้มเหลวเวลาทำงานบนเบราว์เซอร์เครื่องคอมพิวเตอร์ทั่วไป
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(newBooking)
            });
            
            // อัปเดตข้อมูลภายใน UI หน้าเว็บทันทีหลังจากยิงขอข้อมูลเข้าชีต
            bookings.push({ id: newId, name, car, driver, location, start, end });
            calendar.addEvent({
                id: newId,
                title: `${car} [พขร: ${driver}] - ${name} (${location})`,
                start: start,
                end: end,
                backgroundColor: getCarColor(car),
                extendedProps: { name, car, driver, location }
            });
            
            document.getElementById("bookingForm").reset();
            alert("🎉 บันทึกข้อมูลและส่งตารางจองไปยัง Google Sheets เรียบร้อยแล้ว!");

        } catch (error) {
            console.error("Error:", error);
            alert("❌ บันทึกข้อมูลล้มเหลว กรุณาตรวจสอบความถูกต้องของ URL ระบบ");
        }
        showLoading(false);
    });
</script>

</body>
</html>
